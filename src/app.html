<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link async rel="stylesheet" href="%sveltekit.assets%/css/toasts.css" />
    <script src="https://kit.fontawesome.com/75982053de.js" crossorigin="anonymous"></script>
    <!-- Prevent theme flash -->
    <script>try{var t=localStorage.getItem('decider_theme');document.documentElement.setAttribute('data-theme',t==='light'?'light':'dark');}catch(e){document.documentElement.setAttribute('data-theme','dark');}</script>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      /* ---- Design tokens ---- */
      :root, html[data-theme="dark"] {
        --bg: #0a0a0f;
        --surface-1: #111118;
        --surface-2: #18181f;
        --surface-3: #22222c;
        --border-subtle: #2a2a38;
        --border-strong: #3d3d52;
        --text-primary: #f0f0f8;
        --text-secondary: #8a8aa8;
        --text-muted: #4a4a62;
        --accent: #7b6ef6;
        --accent-bright: #9d93ff;
        --accent-glow: rgba(123, 110, 246, 0.15);
        --accent-fg: #0a0a0f;
        --success: #3dd68c;
        --success-glow: rgba(61, 214, 140, 0.12);
        --danger: #f06060;
        --warning: #f0b860;
        --topbar-bg: rgba(10, 10, 15, 0.85);
        --radial-1: rgba(123, 110, 246, 0.05);
        --radial-2: rgba(61, 214, 140, 0.03);
        --font-mono: "JetBrains Mono", ui-monospace, Menlo, Consolas, monospace;
        --font-sans: "Inter", system-ui, -apple-system, sans-serif;
        --density: 20px;
      }
      html[data-theme="light"] {
        --bg: #f6f6f9;
        --surface-1: #ffffff;
        --surface-2: #f1f1f5;
        --surface-3: #e6e6ee;
        --border-subtle: #e1e1ea;
        --border-strong: #c8c8d4;
        --text-primary: #15151c;
        --text-secondary: #5a5a72;
        --text-muted: #9898ae;
        --accent: #5a4df0;
        --accent-bright: #7b6ef6;
        --accent-glow: rgba(90, 77, 240, 0.14);
        --accent-fg: #ffffff;
        --success: #1fa86a;
        --success-glow: rgba(31, 168, 106, 0.12);
        --danger: #d83a3a;
        --warning: #c28014;
        --topbar-bg: rgba(246, 246, 249, 0.85);
        --radial-1: rgba(90, 77, 240, 0.06);
        --radial-2: rgba(31, 168, 106, 0.04);
      }

      *, *::before, *::after { box-sizing: border-box; }

      html, body {
        margin: 0; padding: 0;
        background: var(--bg);
        color: var(--text-primary);
        font-family: var(--font-sans);
        font-size: 14px;
        line-height: 1.45;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        transition: background 0.2s ease, color 0.2s ease;
      }
      body::before {
        content: "";
        position: fixed; inset: 0;
        pointer-events: none;
        background-image:
          radial-gradient(circle at 15% 0%, var(--radial-1), transparent 40%),
          radial-gradient(circle at 90% 120%, var(--radial-2), transparent 45%);
        z-index: 0;
      }
      button { font-family: inherit; cursor: pointer; }
      input, textarea { font-family: inherit; color: inherit; }
      input:focus, button:focus { outline: none; }

      /* ---- Topbar ---- */
      .topbar {
        position: fixed; top: 0; left: 0; right: 0; height: 64px;
        display: flex; align-items: center; padding: 0 32px; gap: 24px;
        background: var(--topbar-bg);
        backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--border-subtle);
        z-index: 50; transition: background 0.2s ease;
      }
      .brand {
        font-family: var(--font-mono); font-size: 16px; font-weight: 600;
        letter-spacing: -0.01em; color: var(--accent);
        display: flex; align-items: center; gap: 10px;
        user-select: none; white-space: nowrap; flex-shrink: 0;
      }
      .brand .hex {
        display: inline-block; width: 14px; height: 16px; background: var(--accent);
        clip-path: polygon(50% 0, 100% 25%, 100% 75%, 50% 100%, 0 75%, 0 25%);
      }
      .decision-title-wrap { flex: 1; display: flex; justify-content: center; min-width: 0; }
      .decision-title {
        max-width: 560px; min-width: 180px; width: 100%;
        font-family: var(--font-sans); font-size: 15px; font-weight: 500;
        color: var(--text-primary); padding: 6px 12px;
        background: transparent; border: 1px solid transparent; border-radius: 6px;
        text-align: center;
        transition: border-color 0.15s ease, background 0.15s ease;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      }
      .decision-title:hover { border-color: var(--border-subtle); }
      .decision-title:focus { border-color: var(--accent); background: var(--surface-2); }
      .decision-title::placeholder { color: var(--text-muted); font-style: italic; }
      .topbar-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
      .theme-toggle {
        width: 32px; height: 32px; border-radius: 6px;
        border: 1px solid var(--border-subtle); background: transparent;
        color: var(--text-secondary);
        display: inline-flex; align-items: center; justify-content: center;
        padding: 0; margin-right: 4px;
        transition: color 0.15s ease, border-color 0.15s ease;
      }
      .theme-toggle:hover { color: var(--text-primary); border-color: var(--border-strong); }
      .theme-toggle svg { width: 16px; height: 16px; display: block; }
      html[data-theme="dark"] .ico-sun { display: block; }
      html[data-theme="dark"] .ico-moon { display: none; }
      html[data-theme="light"] .ico-sun { display: none; }
      html[data-theme="light"] .ico-moon { display: block; }
      .chip-btn {
        background: transparent; border: none;
        color: var(--text-secondary); font-size: 13px; font-family: var(--font-sans);
        padding: 6px 10px; border-radius: 4px; transition: color 0.15s ease;
      }
      .chip-btn:hover { color: var(--text-primary); }
      .chip-btn.is-danger { color: var(--danger); }
      .chip-btn.is-danger:hover { color: #ff8080; }
      .topbar-sep { color: var(--border-strong); }
      .avatar {
        width: 28px; height: 28px; border-radius: 50%;
        background: var(--surface-3); border: 1px solid var(--border-subtle);
        display: inline-flex; align-items: center; justify-content: center;
        font-family: var(--font-mono); font-size: 12px; font-weight: 600;
        color: var(--text-primary); flex-shrink: 0;
      }

      /* ---- Main area ---- */
      .dm-main {
        position: relative; z-index: 1;
        max-width: 1280px; margin: 0 auto;
        padding: 96px 32px 64px;
      }

      /* ---- Toolbar ---- */
      .toolbar {
        display: flex; flex-wrap: wrap; justify-content: space-between;
        align-items: center; gap: 12px; margin-bottom: 20px;
      }
      .status-line {
        display: flex; align-items: center; gap: 16px;
        font-family: var(--font-mono); font-size: 12px; color: var(--text-muted);
        flex-wrap: wrap;
      }
      .status-line .sep { color: var(--border-strong); }
      .status-line .dot {
        width: 6px; height: 6px; border-radius: 50%; background: var(--success);
        display: inline-block; margin-right: 6px;
        box-shadow: 0 0 8px var(--success-glow);
      }
      .status-line .val { color: var(--text-secondary); }
      .action-row { display: flex; gap: 8px; flex-wrap: wrap; }

      /* ---- Buttons ---- */
      .btn {
        font-family: var(--font-sans); font-size: 13px; font-weight: 500;
        padding: 8px 14px; border-radius: 6px; border: 1px solid transparent;
        background: transparent; color: var(--text-secondary);
        display: inline-flex; align-items: center; gap: 8px;
        transition: color 0.15s ease, background 0.15s ease, border-color 0.15s ease;
        white-space: nowrap;
      }
      .btn-primary { background: var(--accent); color: var(--accent-fg); font-weight: 600; }
      .btn-primary:hover { background: var(--accent-bright); }
      .btn-ghost { border-color: var(--border-subtle); }
      .btn-ghost:hover { color: var(--text-primary); border-color: var(--border-strong); }
      .btn-danger { color: var(--danger); border-color: var(--border-subtle); }
      .btn-danger:hover { color: #ff8080; border-color: rgba(240, 96, 96, 0.4); }
      .btn-loading { opacity: 0.65; pointer-events: none; }

      /* ---- Workspace grid ---- */
      .workspace {
        display: grid;
        grid-template-columns: 280px 400px 1fr;
        gap: 20px; align-items: start;
      }

      /* ---- Panel ---- */
      .panel {
        background: var(--surface-1); border: 1px solid var(--border-subtle);
        border-radius: 10px; padding: var(--density);
        transition: border-color 0.15s ease;
        display: flex; flex-direction: column; min-width: 0;
      }
      .panel:hover { border-color: var(--border-strong); }
      .panel-head {
        display: flex; align-items: center; justify-content: space-between;
        gap: 8px; margin-bottom: 14px;
      }
      .panel-label {
        font-size: 12px; font-weight: 600; letter-spacing: 0.12em;
        text-transform: uppercase; color: var(--text-muted);
        display: inline-flex; align-items: center; gap: 10px;
      }
      .count-badge {
        font-family: var(--font-mono); font-size: 11px;
        color: var(--text-secondary); background: var(--surface-3);
        padding: 2px 8px; border-radius: 999px; min-width: 22px;
        text-align: center; font-variant-numeric: tabular-nums;
      }
      .panel-sublabel { font-size: 11px; font-family: var(--font-mono); color: var(--text-muted); }
      .panel-body { display: flex; flex-direction: column; }

      /* ---- Criteria row ---- */
      .criteria-list { display: flex; flex-direction: column; }
      .criteria-row {
        display: grid; grid-template-columns: 16px 1fr 44px 24px;
        align-items: center; gap: 10px;
        padding: 10px 0; border-bottom: 1px solid var(--border-subtle);
      }
      .criteria-row:last-of-type { border-bottom: none; }
      .drag-handle {
        color: var(--text-muted); font-family: var(--font-mono);
        opacity: 0; user-select: none; font-size: 14px;
        transition: opacity 0.15s ease;
      }
      .criteria-row:hover .drag-handle { opacity: 1; }
      .inline-input {
        background: transparent; border: none;
        border-bottom: 1px solid var(--border-subtle);
        padding: 6px 2px; color: var(--text-primary); font-size: 14px; width: 100%;
        transition: border-color 0.15s ease;
      }
      .inline-input::placeholder { color: var(--text-muted); }
      .inline-input:focus { border-bottom: 2px solid var(--accent); padding-bottom: 5px; }
      .weight-input {
        width: 44px; height: 36px; text-align: center;
        background: var(--surface-2); border: 1px solid var(--border-subtle);
        border-radius: 6px; padding: 0;
        font-family: var(--font-mono); font-size: 13px; font-weight: 600;
        color: var(--text-primary); font-variant-numeric: tabular-nums;
        transition: border-color 0.15s ease, background 0.15s ease;
        -moz-appearance: textfield;
      }
      .weight-input::-webkit-outer-spin-button,
      .weight-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
      .weight-input:focus { border-color: var(--accent); background: var(--surface-3); }
      .ghost-x {
        width: 24px; height: 24px; border: none; background: transparent;
        color: var(--text-muted); font-size: 18px; padding: 0; border-radius: 4px;
        transition: color 0.15s ease;
        display: inline-flex; align-items: center; justify-content: center;
        line-height: 1;
      }
      .ghost-x:hover { color: var(--danger); }

      /* ---- Item block ---- */
      .items-list { display: flex; flex-direction: column; gap: 10px; }
      .item-block {
        background: var(--surface-1); border: 1px solid var(--border-subtle);
        border-radius: 8px; padding: 14px;
        transition: border-color 0.15s ease; position: relative;
      }
      .item-block:hover { border-color: var(--border-strong); }
      .item-block.is-top { border-left: 3px solid var(--success); padding-left: 12px; }
      .item-block-head {
        display: grid; grid-template-columns: 1fr 24px;
        align-items: center; gap: 8px;
        padding-bottom: 10px; border-bottom: 1px solid var(--border-subtle);
      }
      .item-name-input {
        background: transparent; border: none; padding: 4px 0;
        color: var(--text-primary); font-size: 14px; font-weight: 600; width: 100%;
        border-bottom: 1px solid transparent;
        transition: border-color 0.15s ease;
      }
      .item-name-input::placeholder { color: var(--text-muted); font-weight: 400; }
      .item-name-input:focus { border-bottom-color: var(--accent); }
      .criteria-grid { display: flex; flex-direction: column; padding-top: 10px; }
      .criteria-value-row {
        display: grid; grid-template-columns: 1fr 54px;
        align-items: center; gap: 12px; padding: 6px 0;
      }
      .criteria-name {
        font-size: 12px; color: var(--text-secondary);
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      }
      .criteria-name.is-empty { color: var(--text-muted); font-style: italic; }
      .weight-hint {
        color: var(--text-muted); font-family: var(--font-mono);
        margin-left: 6px; font-size: 11px;
      }
      .value-input {
        width: 54px; height: 32px; text-align: center;
        background: var(--surface-2); border: 1px solid var(--border-subtle);
        border-radius: 6px; padding: 0;
        font-family: var(--font-mono); font-size: 13px;
        color: var(--text-primary); font-variant-numeric: tabular-nums;
        transition: border-color 0.15s ease;
        -moz-appearance: textfield;
      }
      .value-input::-webkit-outer-spin-button,
      .value-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
      .value-input:focus { border-color: var(--accent); background: var(--surface-3); }
      .value-input.is-missing { border-color: rgba(240, 184, 96, 0.45); }

      /* ---- Add button ---- */
      .add-btn {
        margin-top: 14px; width: 100%; background: transparent;
        color: var(--text-secondary); border: 1px dashed var(--border-subtle);
        border-radius: 8px; padding: 10px 14px;
        font-size: 13px; font-weight: 500; font-family: var(--font-sans);
        transition: color 0.15s ease, border-color 0.15s ease, background 0.15s ease;
        display: flex; align-items: center; justify-content: center; gap: 8px;
      }
      .add-btn:hover {
        color: var(--accent); border-color: var(--accent);
        border-style: solid; background: var(--accent-glow);
      }
      .add-btn .plus { font-family: var(--font-mono); font-weight: 600; }

      /* ---- Empty state ---- */
      .empty-state { text-align: center; padding: 28px 12px; color: var(--text-muted); }
      .empty-state .ring {
        width: 28px; height: 28px; border-radius: 50%;
        border: 2px solid var(--border-strong); margin: 0 auto 14px;
      }
      .empty-state .msg { font-size: 13px; }

      /* ---- Results panel ---- */
      .results-panel .panel-head { margin-bottom: 20px; }
      .results-list { display: flex; flex-direction: column; gap: 8px; }
      .result-row {
        display: grid; grid-template-columns: 48px 1fr 72px;
        gap: 18px; align-items: center; padding: 14px 16px;
        background: var(--surface-1); border: 1px solid var(--border-subtle);
        border-radius: 8px;
        transition: border-color 0.15s ease, background 0.15s ease;
      }
      .result-row:hover { border-color: var(--border-strong); background: var(--surface-2); }
      .result-row.is-top { border-left: 3px solid var(--success); padding-left: 13px; }
      .rank {
        font-family: var(--font-mono); font-size: 24px; font-weight: 600;
        color: var(--text-muted); font-variant-numeric: tabular-nums; letter-spacing: -0.02em;
      }
      .rank .hash { color: var(--text-muted); opacity: 0.5; font-weight: 400; }
      .result-row.is-top .rank { color: var(--success); }
      .result-main { min-width: 0; }
      .result-row-top {
        display: flex; justify-content: space-between; align-items: baseline;
        gap: 12px; margin-bottom: 6px;
      }
      .result-name {
        font-size: 15px; font-weight: 500; color: var(--text-primary);
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      }
      .result-pct {
        font-family: var(--font-mono); font-size: 14px;
        color: var(--text-secondary); font-variant-numeric: tabular-nums; font-weight: 500;
        white-space: nowrap;
      }
      .result-row.is-top .result-pct { color: var(--success); }
      .bar-wrap {
        height: 6px; border-radius: 3px; background: var(--surface-3); overflow: hidden;
      }
      .bar-fill {
        height: 100%; border-radius: 3px; background: var(--accent);
        transition: width 280ms cubic-bezier(0.4, 0, 0.2, 1);
      }
      .result-row.is-top .bar-fill { background: linear-gradient(90deg, var(--accent), var(--success)); }
      .result-meta {
        display: flex; flex-direction: column; align-items: flex-end; gap: 2px;
        font-family: var(--font-mono);
      }
      .raw-score { font-size: 12px; color: var(--text-muted); font-variant-numeric: tabular-nums; }
      .raw-score-label {
        font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted);
      }

      /* ---- Error bar ---- */
      .error-bar {
        background: rgba(240, 96, 96, 0.08); border: 1px solid rgba(240, 96, 96, 0.3);
        color: var(--danger); font-family: var(--font-mono); font-size: 12px;
        padding: 10px 14px; border-radius: 8px; margin-top: 12px;
        display: flex; gap: 10px; align-items: flex-start;
      }
      .error-bar .tag { color: var(--danger); font-weight: 600; letter-spacing: 0.1em; }
      .error-bar .msg { color: var(--text-secondary); }

      /* ---- Footer ---- */
      .footer-strip {
        margin-top: 40px; padding-top: 20px;
        border-top: 1px solid var(--border-subtle);
        display: flex; justify-content: space-between; align-items: center;
        font-family: var(--font-mono); font-size: 11px; color: var(--text-muted);
        letter-spacing: 0.06em;
      }
      .footer-strip .cols { display: flex; gap: 24px; }

      /* ---- Mobile tabs ---- */
      .tabs-mobile {
        display: none; gap: 4px; padding: 4px;
        background: var(--surface-1); border: 1px solid var(--border-subtle);
        border-radius: 8px; margin-bottom: 16px;
      }
      .tab-mobile {
        flex: 1; padding: 8px 12px; font-size: 12px; font-weight: 600;
        letter-spacing: 0.08em; text-transform: uppercase;
        color: var(--text-muted); background: transparent; border: none; border-radius: 6px;
        transition: background 0.15s ease, color 0.15s ease;
      }
      .tab-mobile.is-active { background: var(--surface-3); color: var(--text-primary); }

      /* ---- Animations ---- */
      @keyframes slide-in {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
      }

      /* ---- Responsive ---- */
      @media (max-width: 1180px) {
        .workspace { grid-template-columns: 1fr 1fr; }
        .results-panel { grid-column: 1 / -1; }
      }
      @media (max-width: 820px) {
        .topbar { padding: 0 14px; gap: 10px; height: 56px; }
        .brand span:not(.hex) { display: none; }
        .decision-title { font-size: 14px; min-width: 0; }
        .topbar-right .chip-btn:not(.is-danger) { display: none; }
        .topbar-sep { display: none; }
        .dm-main { padding: 72px 14px 48px; }
        .toolbar { flex-direction: column; align-items: stretch; gap: 10px; }
        .status-line { font-size: 11px; gap: 10px; }
        .action-row { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .action-row .btn { justify-content: center; font-size: 12px; padding: 10px 12px; }
        .workspace { grid-template-columns: 1fr; gap: 14px; }
        .panel { padding: 16px; border-radius: 12px; }
        .tabs-mobile { display: flex !important; position: sticky; top: 56px; z-index: 30; }
        .panel.is-hidden-mobile { display: none; }
        .criteria-row { grid-template-columns: 1fr 48px 28px; gap: 8px; padding: 12px 0; }
        .drag-handle { display: none; }
        .criteria-value-row { grid-template-columns: 1fr 60px; }
        .value-input, .weight-input { height: 38px; }
        .result-row { grid-template-columns: 36px 1fr; row-gap: 6px; padding: 14px; }
        .result-meta { grid-column: 2; flex-direction: row; align-items: center; gap: 8px; }
        .rank { font-size: 20px; }
        .footer-strip { flex-direction: column; gap: 10px; align-items: flex-start; font-size: 10px; }
        .footer-strip .cols { flex-direction: column; gap: 6px; }
      }

      /* ---- Auth nav ---- */
      .auth-nav {
        position: fixed; top: 0; left: 0; right: 0; height: 56px;
        display: flex; align-items: center; justify-content: space-between;
        padding: 0 24px;
        background: var(--topbar-bg); backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--border-subtle); z-index: 50;
      }
      .auth-nav a.brand { text-decoration: none; }

      /* ---- Auth page ---- */
      .auth-page {
        min-height: 100vh; position: relative; z-index: 1;
        display: flex; align-items: center; justify-content: center;
        padding: 80px 24px 40px;
      }
      .auth-box {
        width: 100%; max-width: 400px;
        background: var(--surface-1); border: 1px solid var(--border-subtle);
        border-radius: 12px; padding: 36px 32px;
      }
      .auth-title {
        font-size: 22px; font-weight: 700; color: var(--text-primary);
        margin: 0 0 6px; line-height: 1.2;
      }
      .auth-subtitle { font-size: 13px; color: var(--text-secondary); margin: 0 0 28px; }
      .form-field { margin-bottom: 20px; }
      .form-label {
        display: block; font-size: 12px; font-weight: 600;
        letter-spacing: 0.08em; text-transform: uppercase;
        color: var(--text-muted); margin-bottom: 8px;
      }
      .auth-input {
        width: 100%; height: 42px; padding: 0 14px;
        background: var(--surface-2); border: 1px solid var(--border-subtle);
        border-radius: 8px; font-size: 14px; color: var(--text-primary);
        transition: border-color 0.15s ease, background 0.15s ease;

      .auth-input::placeholder { color: var(--text-muted); }

      .auth-footer { text-align: center; margin-top: 24px; font-size: 13px; color: var(--text-secondary); }
      .auth-link { color: var(--accent); text-decoration: none; font-weight: 500; }
      .auth-link:hover { color: var(--accent-bright); }

      /* ---- Sub-page nav ---- */
      .sub-nav {
        position: fixed; top: 0; left: 0; right: 0; height: 64px;

      .sub-nav-back:hover { color: var(--text-primary); }
      .sub-nav-sep { color: var(--border-strong); font-size: 18px; }
      .sub-nav-title {
        font-family: var(--font-mono); font-size: 14px; font-weight: 600;

      .page-content {

      .spin-wrap { display: flex; align-items: center; justify-content: center; padding: 48px; }
      .spinner {

      }
      @keyframes spin { to { transform: rotate(360deg); } }

      /* ---- Decisions grid ---- */
      .decisions-grid {
        display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px;
      }
      .decision-card {

      .decision-card-best {
        display: flex; align-items: center; gap: 8px;
      }
      .best-label {
        font-size: 11px; font-family: var(--font-mono); letter-spacing: 0.1em;
        text-transform: uppercase; color: var(--text-muted); flex-shrink: 0;
      }
      .best-value {
        font-size: 13px; font-weight: 500; color: var(--success);

      }
      .decision-card-meta {
        display: flex; flex-direction: column; gap: 3px;
        font-size: 11px; font-family: var(--font-mono); color: var(--text-muted);

      .decision-card-footer {

      .badge {
        font-size: 10px; font-family: var(--font-mono); letter-spacing: 0.1em;

      }
      .badge.is-encrypted { color: var(--accent); background: var(--accent-glow); }
      .card-actions { display: flex; gap: 8px; }

      /* ---- Chat workspace ---- */
      .chat-workspace {
        display: grid; grid-template-columns: 280px 1fr;
        height: calc(100vh - 64px); margin-top: 64px;
        overflow: hidden; position: relative; z-index: 1;
      }
      .chat-sidebar {
        border-right: 1px solid var(--border-subtle);
        display: flex; flex-direction: column; overflow: hidden;
        background: var(--surface-1);
      }
      .chat-sidebar-header {
        padding: 16px 20px; border-bottom: 1px solid var(--border-subtle);
        display: flex; align-items: center; justify-content: space-between;
        flex-shrink: 0;
      }
      .chat-sidebar-title {
        font-size: 12px; font-weight: 600; letter-spacing: 0.12em;
        text-transform: uppercase; color: var(--text-muted);
      }
      .chat-list { flex: 1; overflow-y: auto; }
      .chat-list-item {
        display: flex; align-items: center; justify-content: space-between;

      .chat-list-item:hover { background: var(--surface-2); }
      .chat-list-item.is-active { background: var(--surface-2); border-left: 3px solid var(--accent); padding-left: 17px; }
      .chat-list-info { flex: 1; min-width: 0; }
      .chat-list-name { font-size: 14px; font-weight: 500; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .chat-list-date { font-size: 11px; font-family: var(--font-mono); color: var(--text-muted); margin-top: 2px; }
      .chat-list-actions { display: flex; gap: 4px; flex-shrink: 0; }
      .chat-main { display: flex; flex-direction: column; overflow: hidden; }
      .chat-main-header {
        padding: 16px 24px; border-bottom: 1px solid var(--border-subtle);
        display: flex; align-items: center; gap: 12px; flex-shrink: 0;
      }
      .chat-main-back {
        color: var(--text-secondary); background: transparent; border: none;
        padding: 6px; display: none; cursor: pointer; transition: color 0.15s ease;
      }
      .chat-main-back:hover { color: var(--text-primary); }
      .chat-main-name { font-size: 15px; font-weight: 600; color: var(--text-primary); }
      .chat-messages {
        flex: 1; overflow-y: auto; padding: 24px;
        display: flex; flex-direction: column-reverse; gap: 10px;
      }
      .chat-message { display: flex; flex-direction: column; gap: 4px; max-width: 560px; }
      .chat-message.is-mine { align-self: flex-end; align-items: flex-end; }
      .chat-message-meta {
        display: flex; align-items: center; gap: 8px;
        font-size: 11px; font-family: var(--font-mono); color: var(--text-muted);
      }
      .chat-sender { font-weight: 600; color: var(--text-secondary); }
      .chat-bubble {
        padding: 10px 14px; background: var(--surface-2);
        border: 1px solid var(--border-subtle); border-radius: 10px;
        font-size: 14px; color: var(--text-primary); line-height: 1.5;
      }
      .chat-message.is-mine .chat-bubble {
        background: var(--accent); color: var(--accent-fg); border-color: transparent;
        border-radius: 10px 10px 2px 10px;
      }
      .send-bar {
        padding: 16px 24px; border-top: 1px solid var(--border-subtle);
        display: flex; gap: 12px; align-items: center; flex-shrink: 0;
      }
      .send-input {
        flex: 1; height: 42px; padding: 0 14px;
        background: var(--surface-2); border: 1px solid var(--border-subtle);
        border-radius: 8px; font-size: 14px; color: var(--text-primary);
        transition: border-color 0.15s ease;
      }
      .send-input::placeholder { color: var(--text-muted); }
      .send-input:focus { border-color: var(--accent); }
      .send-btn {
        height: 42px; padding: 0 20px;
        background: var(--accent); color: var(--accent-fg);
        border: none; border-radius: 8px; font-weight: 600; font-size: 13px;
        font-family: var(--font-sans); cursor: pointer;
        transition: background 0.15s ease;
      }
      .send-btn:hover { background: var(--accent-bright); }
      .send-btn:disabled { opacity: 0.65; cursor: default; }
      .chat-empty {
        flex: 1; display: flex; flex-direction: column; align-items: center;
        justify-content: center; color: var(--text-muted); gap: 12px;

      /* ---- Pagination ---- */
      .pagination-row {
        display: flex; align-items: center; gap: 8px;

        flex-shrink: 0;
      }
      .page-info { font-family: var(--font-mono); font-size: 12px; color: var(--text-muted); flex: 1; text-align: center; }

      /* ---- Create chat form ---- */
      .form-page {
        position: relative; z-index: 1; max-width: 560px; margin: 0 auto;
        padding: 96px 32px 64px;
      }
      .form-section-title {
        font-size: 12px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;
        color: var(--text-muted); margin-bottom: 12px;
      }
      .invitee-row {
        display: flex; align-items: center; gap: 10px;
        padding: 10px 0; border-bottom: 1px solid var(--border-subtle);
      }
      .invitee-row:last-of-type { border-bottom: none; }
      .invitee-name { flex: 1; font-size: 14px; color: var(--text-primary); }
      .invitees-box {
        background: var(--surface-1); border: 1px solid var(--border-subtle);
        border-radius: 8px; padding: 8px 14px; margin-top: 12px;
        min-height: 48px;
      }

      /* ---- Logout page ---- */
      .logout-page {
        min-height: 100vh; display: flex; align-items: center; justify-content: center;
        position: relative; z-index: 1;
      }
      .logout-box { text-align: center; }
      .logout-title { font-size: 18px; font-weight: 600; color: var(--text-primary); margin-bottom: 8px; }
      .logout-sub { font-size: 13px; color: var(--text-secondary); }
      .logout-sub a { color: var(--accent); text-decoration: none; }

      /* ---- Responsive sub-pages ---- */
      @media (max-width: 820px) {
        .sub-nav { padding: 0 16px; height: 56px; }
        .page-content { padding: 72px 16px 48px; }
        .decisions-grid { grid-template-columns: 1fr; }
        .chat-workspace { grid-template-columns: 1fr; }
        .chat-sidebar { display: none; }
        .chat-sidebar.is-visible { display: flex; position: fixed; top: 56px; left: 0; right: 0; bottom: 0; z-index: 20; }
        .chat-main-back { display: flex !important; }
        .form-page { padding: 72px 16px 48px; }
        .auth-box { padding: 28px 20px; }
      }
    </style>
    %sveltekit.head%
  </head>

    <div style="display: contents">%sveltekit.body%</div>
  </body>
